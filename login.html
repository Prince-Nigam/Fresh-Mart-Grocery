<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshMart - Login</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #27ae60;
      --primary-dark: #219150;
      --primary-light: #2ecc71;
      --accent: #e74c3c;
      --bg: #f0faf4;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1fae5;
      --shadow: 0 20px 60px rgba(39,174,96,.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      background:
        radial-gradient(ellipse at 0% 0%, rgba(39,174,96,.18) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(46,204,113,.12) 0%, transparent 50%),
        #f0faf4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      padding: .75rem 2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(39,174,96,.3);
    }
    .topbar a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
    }
    .topbar-logo {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.25);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem; color: white;
    }
    .topbar span { font-size: 1.2rem; font-weight: 700; color: white; }

    /* ── Main layout ── */
    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: var(--shadow);
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .card-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: white;
      margin-bottom: 1rem;
      box-shadow: 0 8px 20px rgba(39,174,96,.35);
    }
    .card-header h2 { font-size: 1.6rem; color: var(--text); margin-bottom: .3rem; }
    .card-header p  { color: var(--muted); font-size: .95rem; }

    /* Error message */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg.show { display: block; }

    /* Form fields */
    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block;
      font-size: .9rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .5rem;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      font-size: .95rem;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fafafa;
    }
    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(39,174,96,.15);
      background: white;
    }

    .forgot {
      text-align: right;
      margin-top: .4rem;
    }
    .forgot a {
      font-size: .85rem;
      color: var(--primary);
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    /* Forgot password modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); align-items: center; justify-content: center; z-index: 60; }
    .modal.show { display: flex; }
    .modal-content { background: var(--card); border-radius: 12px; padding: 1.25rem; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,.25); border: 1px solid var(--border); }
    .modal-content h3 { margin-bottom: .5rem; }
    .modal-actions { display:flex; gap:8px; margin-top:12px; }

    /* Buttons */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-top: .5rem;
      letter-spacing: .3px;
      box-shadow: 0 4px 15px rgba(39,174,96,.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(39,174,96,.4);
    }
    .btn-primary:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0;
      color: var(--muted); font-size: .85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-secondary {
      width: 100%;
      background: white;
      color: var(--text);
      border: 1.5px solid #e5e7eb;
      padding: 13px;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }
    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f0fdf4;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .83rem;
      color: var(--muted);
    }
    .footer-note a { color: var(--primary); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 1.75rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html">
      <div class="topbar-logo"><i class="fas fa-shopping-cart"></i></div>
      <span>FreshMart</span>
    </a>
  </div>

  <div class="page">
    <div class="card">

      <div class="card-header">
        <div class="card-icon"><i class="fas fa-user"></i></div>
        <h2>Welcome back!</h2>
        <p>Sign in to your FreshMart account</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="loginForm" autocomplete="on" novalidate>

        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email"
              placeholder="you@example.com" required autocomplete="username"
              list="emailSuggestions">
            <datalist id="emailSuggestions"></datalist>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password"
              placeholder="••••••••" required autocomplete="current-password">
          </div>
          <div class="forgot"><a href="#" id="forgotLink">Forgot password?</a></div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>

      </form>

      <!-- Forgot password modal -->
      <div id="forgotModal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="forgotTitle">
          <h3 id="forgotTitle">Forgot password</h3>
          <p style="color:var(--muted);font-size:.95rem;margin-bottom:.75rem;">Enter your account email. We'll show a test reset message for this demo.</p>
          <input id="forgotEmail" type="email" placeholder="you@example.com" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;background:#fafafa;margin-bottom:.5rem;">
          <div id="forgotMsg" style="display:none;padding:10px;border-radius:8px;margin-top:6px;font-size:.95rem;"></div>
          <div class="modal-actions">
            <button id="forgotSend" class="btn-secondary">Send reset</button>
            <button id="forgotClose" class="btn-primary">Close</button>
          </div>
        </div>
      </div>

      <div class="divider">or</div>

      <button type="button" class="btn-secondary" onclick="location.href='signup.html'">
        <i class="fas fa-user-plus"></i> Create a new account
      </button>

      <div class="footer-note">
        By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.
      </div>

    </div>
  </div>

  <script>
    // ── Admin emails list ──
    const ADMIN_EMAILS = [
      'hn878283@gmail.com'
    ];

    // If already logged in, we won't auto-redirect here.
    // A session notice is shown below (after form is available)
    const existingUser = localStorage.getItem('fm_user');

    const form       = document.getElementById('loginForm');
    const errorMsg   = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const loginBtn   = document.getElementById('loginBtn');

    // If the user just logged out, clear form fields to prevent browser autofill showing the email
    if (sessionStorage.getItem('justLoggedOut')) {
      setTimeout(() => {
        try {
          const ei = document.getElementById('email');
          const pi = document.getElementById('password');
          const fe = document.getElementById('forgotEmail');
          if (ei) { ei.value = ''; ei.autocomplete = 'off'; }
          if (pi) pi.value = '';
          if (fe) fe.value = '';
        } catch (err) {}
        try { sessionStorage.removeItem('justLoggedOut'); } catch (e) {}
      }, 120);
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      successMsg.classList.remove('show');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
    }

    // ── Populate email suggestions from registered users ──
    function populateEmailSuggestions() {
      const users = JSON.parse(localStorage.getItem('fm_users') || '[]');
      const datalist = document.getElementById('emailSuggestions');
      datalist.innerHTML = '';
      users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.email;
        opt.label = u.firstName + ' ' + u.lastName;
        datalist.appendChild(opt);
      });
    }
    populateEmailSuggestions();

    // Auto-fill name when email selected from suggestions
    document.getElementById('email').addEventListener('change', function() {
      const users = JSON.parse(localStorage.getItem('fm_users') || '[]');
      const matched = users.find(u => u.email === this.value);
      if (matched) {
        // Focus password field automatically
        document.getElementById('password').focus();
      }
    });

    // Forgot password modal handlers
    const forgotLink = document.getElementById('forgotLink');
    const forgotModal = document.getElementById('forgotModal');
    const forgotClose = document.getElementById('forgotClose');
    const forgotSend = document.getElementById('forgotSend');
    const forgotEmail = document.getElementById('forgotEmail');
    const forgotMsg = document.getElementById('forgotMsg');

    function openForgot() { forgotModal.classList.add('show'); forgotModal.setAttribute('aria-hidden', 'false'); forgotEmail.focus(); forgotMsg.style.display='none'; }
    function closeForgot() { forgotModal.classList.remove('show'); forgotModal.setAttribute('aria-hidden', 'true'); }

    forgotLink.addEventListener('click', function(e){ e.preventDefault(); openForgot(); });
    forgotClose.addEventListener('click', function(){ closeForgot(); });
    forgotModal.addEventListener('click', function(e){ if (e.target === forgotModal) closeForgot(); });

    forgotSend.addEventListener('click', function(){
      const email = (forgotEmail.value || '').trim().toLowerCase();
      if (!email) { forgotMsg.style.display='block'; forgotMsg.style.background='#fff7ed'; forgotMsg.style.border='1px solid #ffd7a3'; forgotMsg.style.color='#92400e'; forgotMsg.textContent='Please enter your email.'; return; }

      // Check local users
      const users = JSON.parse(localStorage.getItem('fm_users') || '[]');
      const u = users.find(x => x.email.toLowerCase() === email);

      // Check admin accounts (demo-only)
      const ADMIN_ACCOUNTS = [
        { email: 'admin@freshmart.com',     password: 'admin123' },
        { email: 'hn878283@gmail.com',      password: 'admin123' },
        { email: 'princenigam972@gmail.com', password: 'admin123' }
      ];
      const a = ADMIN_ACCOUNTS.find(x => x.email.toLowerCase() === email);

      if (!u && !a) {
        forgotMsg.style.display='block'; forgotMsg.style.background='#fef2f2'; forgotMsg.style.border='1px solid #fecaca'; forgotMsg.style.color='#991b1b'; forgotMsg.textContent='No account found with that email.'; return;
      }

      // For this demo, show the existing password (in real apps you'd email a reset link)
      const pwd = u ? u.password : (a ? a.password : undefined);
      forgotMsg.style.display='block'; forgotMsg.style.background='#f0fdf4'; forgotMsg.style.border='1px solid #bbf7d0'; forgotMsg.style.color='#065f46';
      forgotMsg.innerHTML = `If this were a live system we'd send a reset link. For testing, the password is: <strong>${pwd}</strong>`;
    });

    // Reusable session notice UI (show continue + logout)
    function showSessionNotice(eu) {
      if (!eu) return;
      const isAdmin = ADMIN_EMAILS.includes((eu.email || '').toLowerCase());
      // Remove existing notice if present
      const existing = document.getElementById('sessionNotice');
      if (existing) existing.remove();

      const notice = document.createElement('div');
      notice.className = 'success-msg show';
      notice.id = 'sessionNotice';
      notice.style.marginBottom = '1rem';
      notice.innerHTML = `Signed in as <strong>${eu.name || eu.email}</strong>`;

      const wrapper = document.createElement('div');
      wrapper.style.display = 'flex';
      wrapper.style.gap = '8px';
      wrapper.style.marginTop = '8px';

      // Only show admin panel button for admins; do NOT show 'Open Store'
      if (isAdmin) {
        const cont = document.createElement('button');
        cont.type = 'button';
        cont.className = 'btn-secondary';
        cont.textContent = 'Open Admin Panel';
        cont.style.marginRight = '8px';
        cont.onclick = () => { window.location.href = 'admin.html'; };
        wrapper.appendChild(cont);
      }

      const logout = document.createElement('button');
      logout.type = 'button';
      logout.className = 'btn-primary';
      logout.textContent = 'Logout';
      logout.onclick = () => {
        // Mark that the user intentionally logged out so page can clear autofill
        try { sessionStorage.setItem('justLoggedOut', '1'); } catch (e) {}
        localStorage.removeItem('fm_user');
        sessionStorage.removeItem('fm_admin');
        location.reload();
      };

      wrapper.appendChild(logout);
      notice.appendChild(wrapper);
      document.querySelector('.card').insertBefore(notice, form);
    }

    if (existingUser) {
      try { showSessionNotice(JSON.parse(existingUser)); } catch (e) { /* ignore */ }
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      const isAdmin = ADMIN_EMAILS.includes(email);

      if (isAdmin) {
        // ── Admin login ──────────────────────────────
        // Admin credentials are hardcoded
        const ADMIN_ACCOUNTS = [
          { email: 'admin@freshmart.com',     password: 'admin123', name: 'Admin',  lastName: '' },
          { email: 'hn878283@gmail.com',       password: 'admin123', name: 'HN',     lastName: 'Admin' },
          { email: 'princenigam972@gmail.com', password: 'admin123', name: 'Prince', lastName: 'Nigam' }
        ];
        const adminAccount = ADMIN_ACCOUNTS.find(
          a => a.email.toLowerCase() === email && a.password === password
        );

        if (!adminAccount) {
          showError('Invalid admin password. Please try again.');
          return;
        }

        // Save session for admin panel too
        sessionStorage.setItem('fm_admin', JSON.stringify({ email: adminAccount.email, name: adminAccount.name + ' ' + adminAccount.lastName, password: adminAccount.password }));
        localStorage.setItem('fm_user', JSON.stringify({ name: adminAccount.name + (adminAccount.lastName ? ' ' + adminAccount.lastName : ''), email: adminAccount.email }));

        loginBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Signed In';
        loginBtn.style.background = 'linear-gradient(135deg,#2563eb,#1d4ed8)';
        showSuccess('Admin login successful! Redirecting to Admin Dashboard...');
        localStorage.setItem('fm_user', JSON.stringify({ name: adminAccount.name + (adminAccount.lastName ? ' ' + adminAccount.lastName : ''), email: adminAccount.email }));
        setTimeout(() => { window.location.href = 'admin.html'; }, 700);

      } else {
        // ── Normal user login ────────────────────────
        const users = JSON.parse(localStorage.getItem('fm_users') || '[]');
        const user  = users.find(u => u.email.toLowerCase() === email && u.password === password);

        if (!user) {
          showError('Invalid email or password. Please try again or create an account.');
          return;
        }

        localStorage.setItem('fm_user', JSON.stringify({
          name:  user.firstName + ' ' + user.lastName,
          email: user.email
        }));

        loginBtn.innerHTML = '<i class="fas fa-check"></i> Signed In!';
        loginBtn.style.background = 'linear-gradient(135deg,#16a34a,#15803d)';
        showSuccess('Login successful! Redirecting to Store...');
        localStorage.setItem('fm_user', JSON.stringify({ name: user.firstName + ' ' + user.lastName, email: user.email }));
        setTimeout(() => { window.location.href = 'index.html'; }, 700);
      }
    });
  </script>

</body>
</html>
