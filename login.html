<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshMart - Login</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #27ae60;
      --primary-dark: #219150;
      --primary-light: #2ecc71;
      --accent: #e74c3c;
      --bg: #f0faf4;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1fae5;
      --shadow: 0 20px 60px rgba(39,174,96,.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      background:
        radial-gradient(ellipse at 0% 0%, rgba(39,174,96,.18) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(46,204,113,.12) 0%, transparent 50%),
        #f0faf4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      padding: .75rem 2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(39,174,96,.3);
    }
    .topbar a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
    }
    .topbar-logo {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.25);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem; color: white;
    }
    .topbar span { font-size: 1.2rem; font-weight: 700; color: white; }

    /* ── Main layout ── */
    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: var(--shadow);
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .card-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: white;
      margin-bottom: 1rem;
      box-shadow: 0 8px 20px rgba(39,174,96,.35);
    }
    .card-header h2 { font-size: 1.6rem; color: var(--text); margin-bottom: .3rem; }
    .card-header p  { color: var(--muted); font-size: .95rem; }

    /* Error message */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg.show { display: block; }

    /* Form fields */
    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block;
      font-size: .9rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .5rem;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      font-size: .95rem;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fafafa;
    }
    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(39,174,96,.15);
      background: white;
    }

    .forgot {
      text-align: right;
      margin-top: .4rem;
    }
    .forgot a {
      font-size: .85rem;
      color: var(--primary);
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    /* Buttons */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-top: .5rem;
      letter-spacing: .3px;
      box-shadow: 0 4px 15px rgba(39,174,96,.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(39,174,96,.4);
    }
    .btn-primary:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0;
      color: var(--muted); font-size: .85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-secondary {
      width: 100%;
      background: white;
      color: var(--text);
      border: 1.5px solid #e5e7eb;
      padding: 13px;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }
    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f0fdf4;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .83rem;
      color: var(--muted);
    }
    .footer-note a { color: var(--primary); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 1.75rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html">
      <div class="topbar-logo"><i class="fas fa-shopping-cart"></i></div>
      <span>FreshMart</span>
    </a>
  </div>

  <div class="page">
    <div class="card">

      <div class="card-header">
        <div class="card-icon"><i class="fas fa-user"></i></div>
        <h2>Welcome back!</h2>
        <p>Sign in to your FreshMart account</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="loginForm" autocomplete="on" novalidate>

        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email"
              placeholder="you@example.com" required autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password"
              placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <div class="forgot"><a href="#">Forgot password?</a></div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

      </form>

      <div class="divider">or</div>

      <button type="button" class="btn-secondary" onclick="location.href='signup.html'">
        <i class="fas fa-user-plus"></i> Create a new account
      </button>

      <div class="footer-note">
        By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.
      </div>

    </div>
  </div>

  <script>
    // ── Admin emails list ──
    const ADMIN_EMAILS = [
      'admin@freshmart.com',
      'hn878283@gmail.com',
      'princenigam972@gmail.com'
    ];

    // If already logged in, redirect appropriately
    const existingUser = localStorage.getItem('fm_user');
    if (existingUser) {
      const eu = JSON.parse(existingUser);
      window.location.href = ADMIN_EMAILS.includes(eu.email.toLowerCase())
        ? 'admin.html'
        : 'index.html';
    }

    const form       = document.getElementById('loginForm');
    const errorMsg   = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const loginBtn   = document.getElementById('loginBtn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      successMsg.classList.remove('show');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      const isAdmin = ADMIN_EMAILS.includes(email);

      if (isAdmin) {
        // ── Admin login ──────────────────────────────
        // Admin credentials are hardcoded
        const ADMIN_ACCOUNTS = [
          { email: 'admin@freshmart.com',     password: 'admin123', name: 'Admin',  lastName: '' },
          { email: 'hn878283@gmail.com',       password: 'admin123', name: 'HN',     lastName: 'Admin' },
          { email: 'princenigam972@gmail.com', password: 'admin123', name: 'Prince', lastName: 'Nigam' }
        ];
        const adminAccount = ADMIN_ACCOUNTS.find(
          a => a.email.toLowerCase() === email && a.password === password
        );

        if (!adminAccount) {
          showError('Invalid admin password. Please try again.');
          return;
        }

        // Save session for admin panel too
        sessionStorage.setItem('fm_admin', JSON.stringify({ email: adminAccount.email, name: adminAccount.name + ' ' + adminAccount.lastName, password: adminAccount.password }));
        localStorage.setItem('fm_user', JSON.stringify({ name: adminAccount.name + (adminAccount.lastName ? ' ' + adminAccount.lastName : ''), email: adminAccount.email }));

        loginBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Opening Admin Panel...';
        loginBtn.style.background = 'linear-gradient(135deg,#2563eb,#1d4ed8)';
        showSuccess('Admin login successful! Redirecting to Admin Dashboard...');

        setTimeout(() => { window.location.href = 'admin.html'; }, 900);

      } else {
        // ── Normal user login ────────────────────────
        const users = JSON.parse(localStorage.getItem('fm_users') || '[]');
        const user  = users.find(u => u.email.toLowerCase() === email && u.password === password);

        if (!user) {
          showError('Invalid email or password. Please try again or create an account.');
          return;
        }

        localStorage.setItem('fm_user', JSON.stringify({
          name:  user.firstName + ' ' + user.lastName,
          email: user.email
        }));

        loginBtn.innerHTML = '<i class="fas fa-check"></i> Signed In!';
        loginBtn.style.background = 'linear-gradient(135deg,#16a34a,#15803d)';
        showSuccess('Login successful! Redirecting...');

        setTimeout(() => { window.location.href = 'index.html'; }, 900);
      }
    });
  </script>

</body>
</html>
